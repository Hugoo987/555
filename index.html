<DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>來點好康 | 折扣碼 & 蝦幣轉盤</title>
    <style>
        :root {
            --paper: #f5ead0;
            --paper-dot: #ecdcb8;
            --card: #fffaf0;
            --ink: #241f18;
            --orange: #eaa24a;
            --orange-deep: #d8862c;
            --peach: #f7ddb8;
            --muted: #8a7857;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "PingFang TC", "Microsoft JhengHei", "Segoe UI", Arial, sans-serif;
            background-color: var(--paper);
            background-image: radial-gradient(var(--paper-dot) 1.5px, transparent 1.6px);
            background-size: 22px 22px;
            color: var(--ink);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* ---------- Header ---------- */
        .banner {
            position: relative;
            background: var(--orange);
            width: 100%;
            padding: 26px 20px;
            text-align: center;
            border-bottom: 3px solid var(--ink);
        }

        .logo-main {
            display: inline-block;
            color: var(--ink);
            font-size: 30px;
            font-weight: 800;
            letter-spacing: 2px;
        }

        .logo-main::before,
        .logo-main::after {
            content: "✦";
            color: var(--card);
            font-size: 20px;
            margin: 0 12px;
            vertical-align: middle;
        }

        /* ---------- Nav tabs ---------- */
        .nav-buttons {
            position: sticky;
            top: 0;
            z-index: 999;
            display: flex;
            background: var(--paper);
            border-bottom: 3px solid var(--ink);
        }

        .nav-buttons button {
            flex: 1;
            background: transparent;
            color: var(--muted);
            border: none;
            border-radius: 0;
            padding: 16px 0;
            margin: 0;
            font-size: 1.15em;
            font-weight: 800;
            cursor: pointer;
            transition: background 0.2s, color 0.2s;
        }

        .nav-buttons button + button {
            border-left: 3px solid var(--ink);
        }

        .nav-buttons button:hover {
            background: #f0e2c4;
            color: var(--ink);
        }

        .nav-buttons button.active {
            color: var(--ink);
            background: var(--peach);
            box-shadow: inset 0 -5px 0 var(--orange-deep);
        }

        /* ---------- Buttons ---------- */
        button {
            padding: 13px 18px;
            border: 2.5px solid var(--ink);
            border-radius: 14px;
            font-size: 1em;
            font-weight: 800;
            color: var(--ink);
            cursor: pointer;
            background: var(--orange);
            box-shadow: 4px 4px 0 var(--ink);
            transition: transform 0.12s ease, box-shadow 0.12s ease, background 0.2s;
            margin: 7px;
            min-width: 140px;
        }

        button:hover {
            background: #f2b061;
            transform: translate(2px, 2px);
            box-shadow: 2px 2px 0 var(--ink);
        }

        button:active {
            transform: translate(4px, 4px);
            box-shadow: 0 0 0 var(--ink);
        }

        /* Primary "hero" CTAs — dark sticker buttons */
        .special-button {
            background: var(--ink);
            color: #fff5e4;
            box-shadow: 4px 4px 0 var(--orange-deep);
        }

        .special-button:hover {
            background: var(--orange-deep);
            color: #fff;
            box-shadow: 2px 2px 0 var(--ink);
        }

        .special-button:active {
            box-shadow: 0 0 0 var(--ink);
        }

        /* ---------- Content ---------- */
        .content {
            display: none;
            padding: 26px 15px;
            max-width: 1100px;
            margin: 0 auto;
            width: 100%;
            animation: pop 0.5s ease;
        }

        @keyframes pop {
            0% { transform: translateY(10px); opacity: 0; }
            100% { transform: translateY(0); opacity: 1; }
        }

        .content.active {
            display: block;
        }

        .content > p {
            text-align: center;
            color: var(--muted);
            font-size: 1.05em;
            font-weight: 600;
            margin-bottom: 20px;
        }

        .button-section {
            background: var(--card);
            padding: 26px 20px;
            border: 2.5px solid var(--ink);
            border-radius: 22px;
            box-shadow: 6px 6px 0 rgba(36, 31, 24, 0.9);
            margin-bottom: 26px;
            text-align: center;
        }

        .button-section h3 {
            display: inline-block;
            color: var(--ink);
            font-size: 1.3em;
            margin: 0 0 18px 0;
            padding-bottom: 6px;
            border-bottom: 4px solid var(--orange);
        }

        .button-section p {
            color: var(--orange-deep);
            font-weight: 800;
            margin-bottom: 16px;
            font-size: 1.05em;
        }

        main {
            flex: 1;
        }

        /* ---------- Footer ---------- */
        footer {
            margin-top: auto;
            background: var(--orange);
            padding: 26px 20px;
            border-top: 3px solid var(--ink);
        }

        .footer-title {
            font-size: 1.3em;
            margin-bottom: 16px;
            font-weight: 800;
            color: var(--ink);
            text-align: center;
        }

        .social-links {
            display: flex;
            gap: 14px;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap;
        }

        .social-links a {
            display: inline-block;
            padding: 11px 20px;
            border-radius: 12px;
            border: 2.5px solid var(--ink);
            background: var(--card);
            color: var(--ink);
            text-decoration: none;
            font-size: 1em;
            font-weight: 800;
            box-shadow: 3px 3px 0 var(--ink);
            transition: transform 0.12s ease, box-shadow 0.12s ease, background 0.2s;
        }

        .social-links a:hover {
            background: var(--peach);
            transform: translate(2px, 2px);
            box-shadow: 1px 1px 0 var(--ink);
        }

        /* ---------- Toast ---------- */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background-color: var(--ink);
            color: #fff5e4;
            padding: 13px 22px;
            border: 2.5px solid var(--ink);
            border-radius: 14px;
            font-weight: 700;
            box-shadow: 4px 4px 0 var(--orange-deep);
            opacity: 0;
            transition: opacity 0.4s ease;
            z-index: 9999;
        }

        .toast.show {
            opacity: 1;
        }

        /* ---------- Responsive ---------- */
        @media (max-width: 600px) {
            .banner {
                padding: 20px 15px;
            }

            .logo-main {
                font-size: 24px;
            }

            .logo-main::before,
            .logo-main::after {
                margin: 0 8px;
                font-size: 16px;
            }

            .nav-buttons button {
                font-size: 1em;
                padding: 13px 0;
            }

            button {
                min-width: 120px;
                font-size: 0.92em;
            }

            .button-section {
                box-shadow: 4px 4px 0 rgba(36, 31, 24, 0.9);
            }

            .social-links a {
                font-size: 0.92em;
                padding: 9px 16px;
            }
        }
    </style>
</head>

    <script>
        function showContent(sectionId) {
            // Hide all sections
            document.querySelectorAll('.content').forEach(section => {
                section.classList.remove('active');
            });

            // Remove active class from all buttons
            document.querySelectorAll('.nav-buttons button').forEach(btn => {
                btn.classList.remove('active');
            });

            // Show selected section
            document.getElementById(sectionId).classList.add('active');

            // Add active class to clicked button
            if (sectionId === 'discounts') {
                document.getElementById('btn-discounts').classList.add('active');
            } else if (sectionId === 'march-discounts') {
                document.getElementById('btn-march').classList.add('active');
            } else if (sectionId === 'spin') {
                document.getElementById('btn-spin').classList.add('active');
            }
        }

        function copyToClipboard(text) {
            const tempTextArea = document.createElement('textarea');
            tempTextArea.value = text;
            document.body.appendChild(tempTextArea);
            tempTextArea.select();
            document.execCommand('copy');
            document.body.removeChild(tempTextArea);

            // Show toast notification
            const toast = document.getElementById('toast');
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 600);
        }

        function openExternal(url) {
            window.open(url, '_blank', 'noopener,noreferrer');
        }


        function copyAndRedirect(code) {
            copyToClipboard(code);
            setTimeout(() => openExternal('https://s.shopee.tw/7ASd8GEZ4j'), 300);
        }
        function copyAndRedirectcoupang(code) {
            copyToClipboard(code);
            setTimeout(() => openExternal('https://coupa.ng/cnLsCp'), 300);
        }
